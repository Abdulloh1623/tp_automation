version: 2
updates:
  # npm bog'liqliklari — har hafta, mayda/patch yangilanishlar bitta PR'ga guruhlanadi
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions versiyalarini ham yangilab turadi
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
