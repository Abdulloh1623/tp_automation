name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Bir branch'da yangi push bo'lsa, eski (tugamagan) ishni bekor qiladi
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Tekshirish (tsc + test + build)
    runs-on: ubuntu-latest

    # Build/tsc uchun placeholder qiymatlar — CI'da real baza/sirlar kerak emas
    # (auth sahifalari dynamic, Prisma client query paytida ulanadi).
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
      SESSION_SECRET: ci-placeholder-secret-not-used-in-production
      NODE_ENV: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Bog'liqliklarni o'rnatish
        run: npm ci

      - name: Prisma client generatsiya
        run: npx prisma generate

      - name: TypeScript tekshiruvi
        run: npx tsc --noEmit

      - name: Unit testlar
        run: npm test

      - name: Production build
        run: npm run build
