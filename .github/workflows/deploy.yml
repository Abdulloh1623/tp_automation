name: Build & Push image (GHCR)

# main'ga har push'da Docker image quriladi va GitHub Container Registry'ga
# yuklanadi. Server BUILD qilmaydi — faqat tayyor image'ni `pull` qiladi
# (kichik serverda `next build` OOM muammosini butunlay yo'q qiladi).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-image
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/abdulloh1623/tp_automation:latest
            ghcr.io/abdulloh1623/tp_automation:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
