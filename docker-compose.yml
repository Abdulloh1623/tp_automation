# TP Automation — production (Docker Compose).
# Image GitHub Actions'da quriladi va GHCR'ga yuklanadi (build serverda EMAS).
# Deploy (serverda):  docker compose pull && docker compose up -d
# Qiymatlar .env faylidan o'qiladi (.env.example dan nusxa oling).

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD .env da belgilanishi shart}
      POSTGRES_DB: ${POSTGRES_DB:-tp_automation}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tp} -d ${POSTGRES_DB:-tp_automation}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Bir martalik: sxemani qo'llaydi va to'xtaydi (app/worker shundan keyin ishga tushadi)
  migrate:
    image: ${TP_IMAGE:-ghcr.io/abdulloh1623/tp_automation:latest}
    command: npm run db:deploy
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    image: ${TP_IMAGE:-ghcr.io/abdulloh1623/tp_automation:latest}
    restart: unless-stopped
    env_file: .env
    # Host portga chiqarilmaydi — Caddy (reverse proxy) ichki tarmoq orqali ulanadi.
    expose:
      - "3100"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3100/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  # Reverse proxy + avtomatik HTTPS (Let's Encrypt). DOMAIN .env da belgilanadi.
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN .env da belgilanishi shart}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

  # Telegram bot + cron (hisobot, eslatma, kunlik taqsimot, backup)
  worker:
    image: ${TP_IMAGE:-ghcr.io/abdulloh1623/tp_automation:latest}
    restart: unless-stopped
    command: npm run bot
    env_file: .env
    volumes:
      - uploads:/app/uploads
      - backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
  uploads:
  backups:
  caddy_data:
  caddy_config:
